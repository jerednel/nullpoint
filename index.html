<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#06070d" />
  <meta name="description" content="NULLPOINT — a cyberpunk Getting Things Done system. Capture, clarify, organize, engage." />
  <title>NULLPOINT // GTD</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- ?v= cache-buster: index.html is served fresh (Cloudflare DYNAMIC) but the
       CSS is edge-cached for hours. Bump this token whenever css/* changes so
       returning visitors fetch the new file instead of a stale edge copy.
       (js/app.js is an ES module whose imports load unversioned, so bumping a
       token here would not bust the whole chain — purge JS at the edge instead.) -->
  <link rel="stylesheet" href="css/theme.css?v=20260623-2" />
  <link rel="stylesheet" href="css/app.css?v=20260623-2" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2306070d'/%3E%3Ctext x='50' y='72' font-size='70' text-anchor='middle' fill='%2300f0ff' font-family='monospace'%3E%E2%97%88%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <!-- Ambient FX layers -->
  <div class="fx-scanlines" aria-hidden="true"></div>
  <div class="fx-vignette" aria-hidden="true"></div>
  <div class="fx-grid" aria-hidden="true"></div>
  <div class="fx-noise" aria-hidden="true"></div>

  <div id="app" class="app">

    <!-- ░░ SIDEBAR ░░ -->
    <aside class="sidebar">
      <div class="brand" data-glitch="NULLPOINT">
        <span class="brand__mark">◈</span>
        <span class="brand__name" data-text="NULLPOINT">NULLPOINT</span>
      </div>
      <div class="brand__sub">// get_things_done.exe</div>

      <nav class="nav" id="nav"></nav>

      <div class="sidebar__footer">
        <button class="btn btn--ghost" id="export-btn" title="Export data as JSON">⇩ export</button>
        <button class="btn btn--ghost" id="import-btn" title="Import data from JSON">⇧ import</button>
        <input type="file" id="import-file" accept="application/json" hidden />
        <div class="sys-readout" id="sys-readout">sys: ready</div>
      </div>
    </aside>

    <!-- ░░ MAIN ░░ -->
    <main class="main">
      <header class="topbar">
        <form class="capture" id="capture-form" autocomplete="off">
          <span class="capture__prompt">&gt;_</span>
          <input
            type="text"
            id="capture-input"
            class="capture__input"
            placeholder="capture anything… (press C anywhere)"
            aria-label="Quick capture"
          />
          <button type="submit" class="btn btn--primary capture__btn">CAPTURE</button>
        </form>
        <div class="topbar__meta">
          <span class="clock" id="clock">--:--:--</span>
        </div>
      </header>

      <section class="view" id="view"></section>
    </main>
  </div>

  <!-- ░░ DETAIL DRAWER ░░ -->
  <div class="drawer-scrim" id="drawer-scrim" hidden></div>
  <aside class="drawer" id="drawer" hidden aria-hidden="true"></aside>

  <!-- ░░ TOASTS ░░ -->
  <div class="toasts" id="toasts" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
